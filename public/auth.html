<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sign in or create your PayOnce account to manage API keys and access the developer dashboard." />
    <title>PayOnce — Sign in</title>
    <link rel="stylesheet" href="/auth.css" />
  </head>
  <body>
    <div class="bg-glow" aria-hidden="true"></div>

    <main class="auth-container">
      <a class="auth-logo" href="/">
        <span class="logo-mark">P</span>
        PayOnce
      </a>

      <div class="auth-card" id="auth-card">
        <div class="auth-card-header">
          <h1 id="auth-title">Create your account</h1>
          <p id="auth-subtitle">Start building with the PayOnce payment API</p>
        </div>

        <div class="auth-tabs">
          <button id="tab-signup" class="auth-tab active" type="button">Sign up</button>
          <button id="tab-login" class="auth-tab" type="button">Log in</button>
        </div>

        <form id="auth-form" class="auth-form" novalidate>
          <div class="auth-field auth-field-name" id="name-field">
            <label class="auth-field-label" for="auth-name">
              <span class="field-icon">👤</span>
              Name
              <span class="auth-field-optional">optional</span>
            </label>
            <input
              id="auth-name"
              class="auth-input"
              type="text"
              maxlength="80"
              placeholder="Nayan Kunwar"
              autocomplete="name"
            />
          </div>

          <div class="auth-field">
            <label class="auth-field-label" for="auth-email">
              <span class="field-icon">✉️</span>
              Email address
            </label>
            <input
              id="auth-email"
              class="auth-input"
              type="email"
              required
              placeholder="dev@example.com"
              autocomplete="email"
            />
          </div>

          <div class="auth-field">
            <label class="auth-field-label" for="auth-password">
              <span class="field-icon">🔒</span>
              Password
            </label>
            <div class="password-wrapper">
              <input
                id="auth-password"
                class="auth-input"
                type="password"
                minlength="8"
                required
                placeholder="At least 8 characters"
                autocomplete="new-password"
              />
              <button type="button" class="password-toggle" id="toggle-password" aria-label="Toggle password visibility">
                👁️
              </button>
            </div>
            <div class="password-strength" id="password-strength">
              <div class="strength-bar" id="str-1"></div>
              <div class="strength-bar" id="str-2"></div>
              <div class="strength-bar" id="str-3"></div>
              <div class="strength-bar" id="str-4"></div>
            </div>
            <span class="password-hint" id="password-hint">Use 8+ characters with a mix of letters and numbers</span>
          </div>

          <button id="auth-submit" class="auth-submit" type="submit">
            <span class="auth-spinner"></span>
            <span class="auth-submit-label">Create account</span>
          </button>
        </form>

        <p id="auth-status" class="auth-status" aria-live="polite"></p>
      </div>

      <div class="auth-footer">
        <a class="auth-footer-link" href="/">← Back to home</a>
        <a class="auth-footer-link" href="/docs">View API documentation</a>
      </div>
    </main>

    <script src="/auth.js" type="module"></script>
  </body>
</html>
